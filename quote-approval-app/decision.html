<!DOCTYPE html>
<html>

<head>
    <title>Quote Approval</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        textarea {
            width: 100%;
            height: 120px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h2>Quote Approval</h2>

    <p id="actionText"></p>

    <label>Comments (mandatory):</label><br>
    <textarea id="comment" placeholder="Enter your comments..."></textarea><br>

    <button onclick="submitDecision()">Submit</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const action = params.get("action");

        document.getElementById("actionText").innerText =
            action === "APPROVE" ? "You are approving this quote" : "You are rejecting this quote";

        function submitDecision() {
            const comment = document.getElementById("comment").value;
            if (!comment) {
                alert("Comment is mandatory");
                return;
            }

            fetch("/submitDecision", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    token: token,
                    action: action,
                    comment: comment
                })
            })
                .then(res => res.json())
                .then(data => alert(data.message))
                .catch(err => alert("Error submitting decision"));
        }
    </script>

</body>

</html>
